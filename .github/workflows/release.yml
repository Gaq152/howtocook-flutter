name: Release APK

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build:
    name: Build signed APK and publish release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate tag matches pubspec version
        shell: bash
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME#v}"
          PUB=$(grep '^version:' pubspec.yaml | awk '{print $2}' | cut -d'+' -f1)
          if [ "$TAG" != "$PUB" ]; then
            echo "::error::tag ($TAG) 与 pubspec.yaml version ($PUB) 不一致"
            exit 1
          fi
          echo "✅ tag=$TAG, pubspec=$PUB"

      - name: Extract changelog section for this version
        shell: bash
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME#v}"
          if [ ! -f CHANGELOG.md ]; then
            echo "::error::仓库缺少 CHANGELOG.md"
            exit 1
          fi
          awk -v ver="$TAG" '
            BEGIN { needle = "## [" ver "]"; found = 0 }
            index($0, "## [") == 1 {
              if (found) exit
              if (index($0, needle) == 1) { found = 1; next }
            }
            found { print }
          ' CHANGELOG.md \
            | awk 'NF { printed=1; for (i=0;i<pending;i++) print ""; pending=0; print; next } printed { pending++ }' \
            > release_notes.md
          if ! [ -s release_notes.md ]; then
            echo "::error::CHANGELOG.md 中缺少 [$TAG] 版本章节，请先补齐再打 tag"
            exit 1
          fi
          echo "---- release_notes.md ----"
          cat release_notes.md

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Restore keystore from secret
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          set -euo pipefail
          mkdir -p android/keystore
          echo "$KEYSTORE_BASE64" | base64 -d > android/keystore/howtocook-release.jks
          test -s android/keystore/howtocook-release.jks

      - name: Write key.properties
        env:
          STORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          cat > android/key.properties <<EOF
          storeFile=keystore/howtocook-release.jks
          storePassword=${STORE_PASSWORD}
          keyAlias=${KEY_ALIAS}
          keyPassword=${KEY_PASSWORD}
          EOF

      - name: Write .env
        env:
          MCP_BASE_URL: ${{ secrets.MCP_BASE_URL }}
          BUILTIN_DEEPSEEK_API_KEY: ${{ secrets.BUILTIN_DEEPSEEK_API_KEY }}
          RATE_LIMIT_HOURLY: ${{ secrets.RATE_LIMIT_HOURLY }}
        run: |
          cat > .env <<EOF
          MCP_BASE_URL=${MCP_BASE_URL}
          BUILTIN_DEEPSEEK_API_URL=https://api.deepseek.com/v1
          BUILTIN_DEEPSEEK_API_KEY=${BUILTIN_DEEPSEEK_API_KEY}
          RATE_LIMIT_HOURLY=${RATE_LIMIT_HOURLY:-10}
          EOF

      - name: Install dependencies
        run: flutter pub get

      - name: Run build_runner
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build release APKs (split by ABI)
        run: |
          flutter build apk --release --split-per-abi

      - name: Print release certificate fingerprint
        env:
          STORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        run: |
          keytool -list -v \
            -keystore android/keystore/howtocook-release.jks \
            -alias "${{ secrets.KEY_ALIAS }}" \
            -storepass "$STORE_PASSWORD" \
            | grep -E "SHA1|SHA256" || true

      - name: Generate manifest.json
        id: manifest
        shell: bash
        env:
          VNAME: ${{ github.ref_name }}
          OWNER_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          APK_ARM64=$(ls build/app/outputs/apk/release/*arm64-v8a*.apk 2>/dev/null | head -1)
          APK_ARM32=$(ls build/app/outputs/apk/release/*armeabi-v7a*.apk 2>/dev/null | head -1)
          test -f "$APK_ARM64" || { echo "::error::arm64 APK not found"; exit 1; }
          test -f "$APK_ARM32" || { echo "::error::arm32 APK not found"; exit 1; }
          SHA_ARM64=$(sha256sum "$APK_ARM64" | cut -d' ' -f1)
          SHA_ARM32=$(sha256sum "$APK_ARM32" | cut -d' ' -f1)
          SIZE_ARM64=$(stat -c%s "$APK_ARM64")
          FNAME_ARM64=$(basename "$APK_ARM64")
          FNAME_ARM32=$(basename "$APK_ARM32")
          VCODE=$(grep '^version:' pubspec.yaml | awk '{print $2}' | awk -F'+' '{print ($2==""?1:$2)}')
          VNAME_STRIPPED="${VNAME#v}"
          export SHA_ARM64 SHA_ARM32 SIZE_ARM64 FNAME_ARM64 FNAME_ARM32 VCODE VNAME_STRIPPED OWNER_REPO
          python3 - <<'PY' > manifest.json
          import json, os, pathlib
          notes = pathlib.Path("release_notes.md").read_text(encoding="utf-8").strip()
          repo = os.environ["OWNER_REPO"]
          base = f"https://github.com/{repo}/releases/latest/download"
          data = {
              "versionName": os.environ["VNAME_STRIPPED"],
              "versionCode": int(os.environ["VCODE"]),
              "downloadUrl": f"{base}/{os.environ['FNAME_ARM64']}",
              "downloadUrlArm64": f"{base}/{os.environ['FNAME_ARM64']}",
              "downloadUrlArm32": f"{base}/{os.environ['FNAME_ARM32']}",
              "sha256": os.environ["SHA_ARM64"],
              "sha256Arm64": os.environ["SHA_ARM64"],
              "sha256Arm32": os.environ["SHA_ARM32"],
              "size": int(os.environ["SIZE_ARM64"]),
              "publishedAt": os.environ.get("GITHUB_EVENT_HEAD_COMMIT_TIMESTAMP") or "",
              "notes": notes,
          }
          print(json.dumps(data, ensure_ascii=False, indent=2))
          PY
          echo "---- manifest.json ----"
          cat manifest.json

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body_path: release_notes.md
          draft: false
          prerelease: false
          files: |
            build/app/outputs/apk/release/*arm64-v8a*.apk
            build/app/outputs/apk/release/*armeabi-v7a*.apk
            manifest.json
